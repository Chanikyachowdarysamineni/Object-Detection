version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: detection_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${DB_NAME:-detections_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - detection_network
    restart: unless-stopped
    # Security: Use read-only filesystem where possible
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: detection_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-change-me-in-production}@postgres:5432/${DB_NAME:-detections_db}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      
      # Server
      API_HOST: 0.0.0.0
      API_PORT: 8000
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      
      # Model
      MODEL_PATH: ${MODEL_PATH:-yolov8n.pt}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.5}
      IOU_THRESHOLD: ${IOU_THRESHOLD:-0.45}
      DEVICE: ${DEVICE:-0}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    
    ports:
      - "8000:8000"
    
    volumes:
      - ./backend:/app/backend:ro
      - ./src:/app/src:ro
      - ./logs:/app/logs
    
    networks:
      - detection_network
    
    restart: unless-stopped
    
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: detection_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - fastapi
  #   networks:
  #     - detection_network
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  detection_network:
    driver: bridge
